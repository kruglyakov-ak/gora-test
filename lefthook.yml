pre-commit:
  commands:
    biome:
      glob: "*.{js,ts,cjs,mjs,d.cts,d.mts,jsx,tsx,json,jsonc}"
      run: |
        npx @biomejs/biome format --write --no-errors-on-unmatched --files-ignore-unknown=true {staged_files}
        npx @biomejs/biome check --write --no-errors-on-unmatched --files-ignore-unknown=true {staged_files}
        npx @biomejs/biome organize-imports --write --no-errors-on-unmatched --files-ignore-unknown=true {staged_files}
      stage_fixed: true